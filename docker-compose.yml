services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trading_tom}
      POSTGRES_USER: ${POSTGRES_USER:-dev}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dev} -d ${POSTGRES_DB:-trading_tom}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  engine:
    build: ./api
    volumes:
      - ./api:/app
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_started
    restart: unless-stopped
    command: ["python", "-m", "trading_tom.engine.runner"]

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    env_file: .env
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
